services:
  web:
    image: ghcr.io/andreydos/mytripspots-web:${TAG:-latest}
    container_name: mytripspots-web
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env.web
    restart: unless-stopped
    networks:
      - infra

  api:
    image: ghcr.io/andreydos/mytripspots-api:${TAG:-latest}
    container_name: mytripspots-api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.api
    restart: unless-stopped
    networks:
      - infra

networks:
  infra:
    external: true
