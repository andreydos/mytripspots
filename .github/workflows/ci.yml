name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter web lint
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test

  web-e2e:
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_API_GRAPHQL_URL: http://localhost:8000/graphql
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter web build
      - run: pnpm exec playwright install chromium --with-deps
        working-directory: apps/web
      - run: pnpm --filter web test:e2e

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mytripspots
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mytripspots"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply database schema and seed
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d mytripspots -f infra/sql/0001_init.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d mytripspots -f infra/sql/0002_seed.sql
      - run: pip install -e ./apps/api
      - run: pip install pytest
      - run: python -m pytest
        working-directory: apps/api
        env:
          AUTH_TESTING_ENABLED: "true"
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mytripspots
          CLERK_JWKS_URL: https://placeholder.example/.well-known/jwks.json
          CLERK_ISSUER: https://placeholder.example
          APP_ENV: development
